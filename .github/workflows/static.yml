jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Altere para o nome da subpasta que está causando a duplicação
        working-directory: Dashboard-skeleton-design 
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Se o build gerar a pasta 'dist' dentro da subpasta, use o caminho abaixo
          path: './Dashboard-skeleton-design/dist' 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
