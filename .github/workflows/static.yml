name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"] # Certifique-se de usar a branch que você está usando (master ou main)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Tente "." se o package.json estiver na raiz. 
        # Se estiver dentro de uma pasta, coloque o nome da pasta aqui:
        working-directory: . 
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
