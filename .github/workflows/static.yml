name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Instala e faz o build (vamos tentar na raiz)
      - name: Install and Build
        run: |
          npm install
          npm run build
      
      # 2. SE o build falhar, vamos tentar na subpasta com o mesmo nome
      - name: Install and Build (Fallback)
        if: failure()
        run: |
          cd Dashboard-skeleton-design
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # 3. Upload: tenta pegar a pasta 'dist' da raiz ou da subpasta
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          # Isso vai subir todo o conteúdo; o GitHub Pages vai procurar o index.html
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
