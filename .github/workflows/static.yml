name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Este comando vai listar a estrutura de pastas real
      - name: Show directory structure
        run: find . -maxdepth 3 -not -path '*/.*'
        
      # Ajuste automático: tenta entrar na primeira subpasta que encontrar
      - name: Install and Build
        run: |
          cd $(ls -d */ | head -n 1)
          npm install
          npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Busca a pasta 'dist' dentro da subpasta encontrada
          path: './*/dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
